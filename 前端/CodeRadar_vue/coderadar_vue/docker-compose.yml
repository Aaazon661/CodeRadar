version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coderadar-frontend
    ports:
      - "80:80"
    depends_on:
      - database
    networks:
      - coderadar-network
    restart: unless-stopped

  # 后端服务（暂时注释掉）
