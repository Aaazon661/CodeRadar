    # 数据库服务
  database:
    image: mysql:8.0
    container_name: coderadar-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: coderadar
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    # ports:
    #   - "3306:3306"
    networks:
      - coderadar-network
    restart: unless-stopped


networks:
  coderadar-network:
    driver: bridge

volumes:
  mysql-data:
